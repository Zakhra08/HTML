<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qeydiyyat Formu</title>
</head>
<body>
<h2>Qeydiyyat Formu</h2>
<form>
    <label for="ad">Ad:</label><br>
    <input type="text" id="ad" name="ad"><br><br>
    <label for="email">Email:</label><br>
    <input type="email" id="email" name="email"><br><br>
    <label for="sifre">Şifrə:</label><br>
    <input type="password" id="sifre" name="sifre"><br><br>
    <label>Cins:</label><br>
    <input type="radio" name="cins" value="kisi"> Kişi<br>
    <input type="radio" name="cins" value="qadin"> Qadın<br><br>
    <label>Hobbilər:</label><br>
    <input type="checkbox" name="hobbi" value="idman"> İdman<br>
    <input type="checkbox" name="hobbi" value="musiqi"> Musiqi<br>
    <input type="checkbox" name="hobbi" value="kitab"> Kitab oxumaq<br><br>
    <input type="submit" value="Göndər">
</form>
</body>
</html>
